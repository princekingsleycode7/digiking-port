<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Designers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        /* General Setup and Fonts */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #0d0c22;
            margin: 0;
            padding: 2rem 4rem;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 90px 0px;
        }

        /* Header Section */
        header {
            width: 100%;
        }

        .main-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
            padding-bottom: 2rem;
        }

        .left-panel {
            flex-basis: 50%;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .header-text h1 {
            font-size: 3rem;
            font-weight: 800;
            margin: 0;
            line-height: 1.1;
            letter-spacing: -1.5px;
        }

        .header-text p {
            font-size: 1.1rem;
            color: #3d3d4e;
            max-width: 450px;
            margin-top: 1rem;
            line-height: 1.5;
        }

        /* Controls: Tabs, Search, Tags */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin: 0px 0px 25px 0px;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1.25rem;
            border: none;
            border-radius: 9999px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .tab.active {
            background-color: #0d0c22;
            color: #ffffff;
        }

        .tab:not(.active) {
            background-color: transparent;
            color: #3d3d4e;
        }

        .tab:not(.active):hover {
            background-color: #f3f3f4;
        }

        .tab svg {
            width: 18px;
            height: 18px;
        }

        .search-container {
            position: relative;
            width: 100%;
        }

        .search-container input {
            width: 100%;
            padding: 1.2rem 4rem 1.2rem 1.5rem;
            font-size: 1.1rem;
            border: none;
            background-color: #f3f3f4;
            border-radius: 9999px;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 25px;
        }

        .search-container input::placeholder {
            color: #6e6d7a;
        }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            background-color: #ea4c89;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .popular-tags {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.9rem;
        }

        .popular-tags span {
            font-weight: 500;
            color: #0d0c22;
        }

        .popular-tags a {
            padding: 0.5rem 1rem;
            border: 1px solid #e7e7e9;
            border-radius: 9999px;
            text-decoration: none;
            color: #3d3d4e;
            transition: border-color 0.2s;
        }

        .popular-tags a:hover {
            border-color: #dbdbde;
        }

        /* Right Panel: Illustration */
        .right-panel {
            flex-basis: 50%;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
        }

        .main-illustration {
            width: 100%;
            height: auto;
            border-radius: 20px;
            display: block;
        }

        .artist-credit {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 6px 12px 6px 6px;
            border-radius: 9999px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .artist-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
        }

        /* Main Navigation Bar */
        .main-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e7e7e9;
            padding-top: 1.5rem;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-grow: 1;
            overflow: hidden;
        }

        .following-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1rem;
            font-size: 1rem;
            font-weight: 500;
            background-color: #ffffff;
            color: #0d0c22;
            border: 1px solid #e7e7e9;
            border-radius: 8px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            white-space: nowrap;
        }

        .nav-links a {
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            color: #6e6d7a;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #0d0c22;
        }

        .nav-links a.active-link {
            color: #0d0c22;
            font-weight: 700;
        }

        .nav-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(to right, transparent, white 50%);
            position: absolute;
            right: 20%;
            color: #6e6d7a;
        }

        .filters-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1rem;
            font-size: 1rem;
            font-weight: 500;
            background-color: #ffffff;
            color: #0d0c22;
            border: 1px solid #e7e7e9;
            border-radius: 8px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .filters-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .container {
                padding: 2rem 0;
            }

            /* Stack main content vertically */
            .main-content {
                flex-direction: column;
                gap: 2.5rem;
                padding-bottom: 2.5rem;
            }

            .left-panel, .right-panel {
                flex-basis: 100%;
                width: 100%;
            }

            /* Adjust typography for mobile */
            .header-text h1 {
                font-size: 2.25rem;
                letter-spacing: -1px;
                text-align: center;
            }

            .header-text p {
                font-size: 1rem;
                max-width: 100%;
                text-align: center;
                margin: 1rem auto 0;
            }

            /* Mobile tabs */
            .tabs {
                justify-content: center;
                flex-wrap: wrap;
                gap: 0.5rem;
                margin-bottom: 1.5rem;
            }

            .tab {
                padding: 0.65rem 1rem;
                font-size: 0.95rem;
            }

            .tab svg {
                width: 16px;
                height: 16px;
            }

            /* Mobile search */
            .search-container input {
                padding: 1rem 3.5rem 1rem 1.25rem;
                font-size: 1rem;
                margin-bottom: 1.5rem;
            }

            .search-btn {
                width: 40px;
                height: 40px;
                right: 6px;
            }

            /* Hide popular tags on mobile */
            .popular-tags {
                display: none;
            }

            /* Mobile illustration */
            .image-wrapper {
                margin: 0 auto;
                max-width: 400px;
            }

            .artist-credit {
                bottom: 15px;
                right: 15px;
                font-size: 0.85rem;
            }

            .artist-avatar {
                width: 24px;
                height: 24px;
            }

            /* Mobile navigation */
            .main-nav {
                flex-direction: column;
                gap: 1.5rem;
                align-items: stretch;
                padding-top: 2rem;
            }

            .nav-left {
                flex-direction: column;
                gap: 1.5rem;
                overflow: visible;
            }

            .following-btn {
                align-self: center;
                order: 2;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem;
                order: 1;
            }

            .nav-links a {
                font-size: 0.95rem;
                padding: 0.5rem 0;
            }

            .nav-arrow {
                display: none;
            }

            .filters-btn {
                align-self: center;
                font-size: 0.95rem;
            }
        }

        /* Extra small mobile screens */
        @media (max-width: 480px) {
            body {
                padding: 0.75rem;
            }

            .header-text h1 {
                font-size: 2rem;
            }

            .header-text p {
                font-size: 0.95rem;
            }

            .tab {
                padding: 0.6rem 0.85rem;
                font-size: 0.9rem;
            }

            .search-container input {
                padding: 0.9rem 3.25rem 0.9rem 1.1rem;
                font-size: 0.95rem;
            }

            .search-btn {
                width: 36px;
                height: 36px;
            }

            .nav-links {
                gap: 0.75rem;
            }

            .nav-links a {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="main-content">
                <div class="left-panel">
                    <div class="header-text">
                        <h1>Discover the World's Top Designers</h1>
                        <p>Explore work from the most talented and accomplished designers ready to take on your next project.</p>
                    </div>
                    <div class="controls">
                        <div class="tabs">
                            <button class="tab active">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                                Shots
                            </button>
                            <button class="tab">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                                Designers
                            </button>
                            <button class="tab">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                                Services
                            </button>
                        </div>
                        <div class="search-container">
                            <input type="text" placeholder="What type of design are you interested in?">
                            <button class="search-btn">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                            </button>
                        </div>
                        <div class="popular-tags">
                            <span>Popular:</span>
                            <a href="#">dashboard</a>
                            <a href="#">landing page</a>
                            <a href="#">e-commerce</a>
                            <a href="#">logo</a>
                        </div>
                    </div>
                </div>
                <div class="right-panel">
                    <div class="image-wrapper">
                        <img src="https://images.unsplash.com/photo-1581291518857-4e27b48ff24e?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1000&q=80" alt="Illustration of a man running with his dog" class="main-illustration">
                        <div class="artist-credit">
                            <img src="https://i.imgur.com/p1fL4gH.png" alt="Wanda Arca profile picture" class="artist-avatar">
                            <span>Wanda Arca</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <nav class="main-nav">
            <div class="nav-left">
                <button class="following-btn">
                    Following
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </button>
                <div class="nav-links">
                    <a href="#" class="active-link">Discover</a>
                    <a href="#">Animation</a>
                    <a href="#">Branding</a>
                    <a href="#">Illustration</a>
                    <a href="#">Mobile</a>
                    <a href="#">Print</a>
                    <a href="#">Product Design</a>
                    <a href="#">Typography</a>
                    <a href="#">Web Design</a>
                </div>
                <div class="nav-arrow">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>
            </div>
            <div class="nav-right">
                <button class="filters-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
                    Filters
                </button>
            </div>
        </nav>
    </div>
</body>
</html>
