<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSAP Tilt & Overlay Menu</title>
    <link rel="stylesheet" href="untitled.css" />
  </head>
  <body>
    <!-- Main page content that gets pushed down -->
    <div class="container">
      <section class="hero">
        <div class="hero-img">
          <img src="../../IMG/New folder/agric/P12.jpeg" alt="Futuristic building in water" />
        </div>
        <h1>Digital architecture that rises from the void.</h1>
      </section>
      <section class="about" style="height: 1200px; width: 100vw;">
        <h2>About Void Construct</h2>
        </section>
    </div>

    <!-- Navigation Bar -->
    <nav>
      <div class="logo">
        <a href="#">Void Construct</a>
      </div>
      
      <div class="menu-toggle">
        <p id="menu-open">Menu</p>
        <p id="menu-close">Close</p>
      </div>
    </nav>

    <!-- Fullscreen Menu Overlay -->
    <div class="menu-overlay">
      <div class="menu-content">
        <div class="menu-items">
          <div class="col-lg">
            <div class="menu-preview-img">
              <img src="https://images.unsplash.com/photo-1589995279672-13658535a235?ixlib=rb-4.0.3&q=85&fm=jpg&crop=entropy&cs=srgb&w=600" alt="Preview Image 1" />
            </div>
          </div>
          <div class="col-sm">
            <div class="menu-links">
              <div class="link">
                <a href="#" data-img="https://images.unsplash.com/photo-1589995279672-13658535a235?ixlib=rb-4.0.3&q=85&fm=jpg&crop=entropy&cs=srgb&w=600">Visions</a>
              </div>
              <div class="link">
                <a href="#" data-img="https://images.unsplash.com/photo-1588891986872-35353531f9e9?ixlib=rb-4.0.3&q=85&fm=jpg&crop=entropy&cs=srgb&w=600">Core</a>
              </div>
              <div class="link">
                <a href="#" data-img="https://images.unsplash.com/photo-1590399432392-235b3e6e1ff9?ixlib=rb-4.0.3&q=85&fm=jpg&crop=entropy&cs=srgb&w=600">Signals</a>
              </div>
              <div class="link">
                <a href="#" data-img="https://images.unsplash.com/photo-1598488035139-3a3399bf0d42?ixlib=rb-4.0.3&q=85&fm=jpg&crop=entropy&cs=srgb&w=600">Connect</a>
              </div>
            </div>
            <div class="menu-socials">
              <div class="social"><a href="#">Behance</a></div>
              <div class="social"><a href="#">Dribbble</a></div>
              <div class="social"><a href="#">LinkedIn</a></div>
              <div class="social"><a href="#">Instagram</a></div>
            </div>
          </div>
        </div>
        <div class="menu-footer">
          <div class="col-lg">
            <a href="#">Run Sequence</a>
          </div>
          <div class="col-sm">
            <a href="#">Origin</a>
            <a href="#">Join Signal</a>
          </div>
        </div>
      </div>
    </div>

    <!-- GSAP CDN -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="untitled.js"></script>
  </body>
</html>
