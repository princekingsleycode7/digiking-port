<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla JS Page Transitions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="logo">
            <a href="#" class="nav-link" data-target="home">INK_OCTOPUS</a>
        </div>
        <div class="nav-links">
            <a href="#" class="nav-link" data-target="home">Home</a>
            <a href="#" class="nav-link" data-target="about">About</a>
            <a href="#" class="nav-link" data-target="contact">Contact</a>
        </div>
    </nav>

    <!-- Page Content -->
    <main>
        <div id="home" class="page active">
            <h1>Index</h1>
        </div>
        <div id="about" class="page">
            <h1>The Crew</h1>
        </div>
        <div id="contact" class="page">
            <h1>Say Hello</h1>
        </div>
    </main>

    <!-- Transition Overlay -->
    <div id="transition-overlay"></div>

    <script src="script.js"></script>
</body>
</html>
